# Knowledge Base - Docker Compose Configuration
# This file sets up the complete infrastructure for the Knowledge Base system

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:17-alpine
    container_name: kb-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-knowledge_base}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-knowledge_base}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kb-network

  # ==========================================================================
  # Redis Session Store
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: kb-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - kb-network

  # ==========================================================================
  # Knowledge Base Backend
  # ==========================================================================
  backend:
    build:
      context: ../be
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-knowledge-base-backend}:${BACKEND_VERSION:-latest}
    container_name: kb-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override DB host to use Docker network
      DB_HOST: postgres
      REDIS_HOST: redis
      # Upload directory for document files (shared with converter)
      UPLOAD_DIR: /app/uploads
    ports:
      - "${PORT:-3001}:3001"
    expose:
      - "3001"
    volumes:
      - backend_logs:/app/logs
      - backend_data:/app/.data
      # Shared upload volume — backend writes, converter reads
      - uploads_data:/app/uploads
      # Mount config directory for system-tools.config.json & ragflow.config.json
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - kb-network

  # ==========================================================================
  # Document Converter (Office → PDF)
  # ==========================================================================
  converter:
    build:
      context: ../converter
      dockerfile: Dockerfile
    image: ${CONVERTER_IMAGE:-kb-converter}:${CONVERTER_VERSION:-latest}
    container_name: kb-converter
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379
      BACKEND_URL: http://backend:3001
      POLL_INTERVAL: 30
      CONVERSION_TIMEOUT: 300
      # Must match backend's UPLOAD_DIR so converter reads/writes to the same path
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads    # Shared volume: read original files, write converted PDFs
      - converter_temp:/tmp/converter  # Temp space for intermediate PDF output
    networks:
      - kb-network

# ==========================================================================
# Networks
# ==========================================================================
networks:
  kb-network:
    driver: bridge

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  backend_data:
    driver: local
  # Shared upload directory — backend writes originals, converter reads & writes PDFs back
  uploads_data:
    driver: local
  converter_temp:
    driver: local
